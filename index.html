<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caversen Print — High Quality Wall Art</title>
  
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.03); 
      --glass-hover: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.08); 
      --text: #f0ece4; 
      --muted: #888; 
    }

    html, body { 
      min-height: 100vh;
      width: 100%; 
      background-color: var(--bg-dark); 
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      display: flex; 
      flex-direction: column;
      overflow-x: hidden;
    }

    header { 
      position: fixed; top: 0; left: 0; width: 100%;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px); padding: 10px 40px; 
      display: grid; grid-template-columns: 1fr 1fr 1fr; 
      align-items: center; border-bottom: 1px solid var(--border); z-index: 1000;
    }

    .logo img { height: 75px; width: auto; display: block; margin: 0 auto; }
    
    .header-socials { display: flex; gap: 20px; justify-content: flex-end; }
    .header-socials a { color: var(--muted); font-size: 19px; transition: 0.3s; text-decoration: none; }
    .header-socials a:hover { color: var(--text); }
    
    main { 
      flex: 1; 
      padding: 140px 40px 60px; 
      max-width: 1200px; 
      margin: 0 auto; 
      width: 100%;
    }

    .hero-title { 
      font-size: 12px; font-weight: 300; letter-spacing: 8px; 
      text-transform: uppercase; margin-bottom: 50px; 
      color: var(--muted); text-align: center;
    }

    .collection-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 20px; 
    }

    .card { 
      background: var(--glass); 
      border: 1px solid var(--border); 
      border-radius: 15px; 
      height: 160px; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      text-decoration: none; 
      color: var(--text); 
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card:hover { 
      background: var(--glass-hover); 
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-5px);
    }

    .card:hover::before { opacity: 1; }

    .card h2 { 
      font-size: 0.95rem; 
      font-weight: 500; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      z-index: 1;
    }

    footer { 
      flex-shrink: 0; padding: 30px; text-align: center;
      font-size: 9px; color: var(--muted); letter-spacing: 3px; 
      border-top: 1px solid var(--border);
      background: #000;
    }

    @media (max-width: 900px) { 
      .collection-grid { grid-template-columns: repeat(2, 1fr); } 
      header { padding: 10px 20px; }
    }

    @media (max-width: 600px) {
      .collection-grid { grid-template-columns: 1fr; }
      .card { height: 120px; }
      main { padding-top: 120px; }
      .logo img { height: 60px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left"></div> 
  <a class="logo" href="index.html">
    <img src="logo.png" alt="Logo">
  </a>
  <div class="header-socials">
    <a href="https://www.instagram.com/caversen.maroc/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://wa.me/212700256668" target="_blank"><i class="fab fa-whatsapp"></i></a>
  </div>
</header>

<main>
  <h1 class="hero-title">Our Collections</h1>
  <div class="collection-grid">
    <a href="Anime/index.html" class="card"><h2>Anime</h2></a>
    <a href="Bikes/index.html" class="card"><h2>Bikes & Cars</h2></a>
    <a href="Girls/index.html" class="card"><h2>For Girls</h2></a>
    <a href="Football/index.html" class="card"><h2>Football</h2></a>
    <a href="Gaming/index.html" class="card"><h2>Gaming</h2></a>
    <a href="Islam/index.html" class="card"><h2>Islam</h2></a>
    <a href="Movies/index.html" class="card"><h2>Movies</h2></a>
    <a href="Quotes/index.html" class="card"><h2>Quotes</h2></a>
    <a href="Other/index.html" class="card"><h2>Other</h2></a>
  </div>
</main>

<footer><p>© 2026 CAVERSEN PRINT — MOROCCO</p></footer>

</body>
</html>
