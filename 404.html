<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page Not Found</title>
  
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root { 
      --bg-dark: #000000;
      --glass: rgba(255, 255, 255, 0.05); 
      --border: rgba(255, 255, 255, 0.1); 
      --text: #f0ece4; 
      --muted: #888; 
    }

    body { 
      background-color: var(--bg-dark); 
      color: var(--text); 
      font-family: 'Montserrat', sans-serif; 
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Moving Background Container */
    #bg-container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      filter: blur(40px) brightness(0.4);
      overflow: hidden;
    }

    .bg-img {
      position: absolute;
      width: 300px;
      height: auto;
      border-radius: 20px;
      opacity: 0.6;
      transition: all 10s linear;
    }

    .logo-404 {
      height: 80px;
      width: auto;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .error-container {
      background: var(--glass);
      border: 1px solid var(--border);
      padding: 50px 40px;
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      max-width: 450px;
      width: 90%;
      z-index: 10;
    }

    h1 { font-size: 60px; font-weight: 700; margin-bottom: 5px; }
    p { color: var(--muted); margin-bottom: 30px; letter-spacing: 1px; }

    .home-btn {
      display: inline-block;
      text-decoration: none;
      color: #000;
      background: #ffffff;
      padding: 14px 30px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: 0.3s;
    }

    .home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

<div id="bg-container"></div>

<img src="/logo.png" alt="Caversen Logo" class="logo-404">

<div class="error-container">
  <h1>404</h1>
  <p>The page you are looking for doesn't exist.</p>
  <a href="/" class="home-btn">Back to Home</a>
</div>

<script>
  // Folders to pull random images from
  const categories = ['Anime', 'Bikes', 'Cars', 'Football', 'Gaming', 'Islam', 'Movies', 'Girls', 'Quotes'];
  const container = document.getElementById('bg-container');
  const imgCount = 8; // Number of floating images

  function createImg() {
    const img = document.createElement('img');
    const randomCat = categories[Math.floor(Math.random() * categories.length)];
    const randomNum = Math.floor(Math.random() * 50) + 1; // Assuming images are 1-50
    
    img.src = `/${randomCat}/${randomNum}.webp`;
    img.className = 'bg-img';
    
    // Random start position
    resetPos(img);
    
    container.appendChild(img);
    
    // Kickstart movement
    setTimeout(() => moveImg(img), 100);
  }

  function resetPos(img) {
    img.style.top = Math.random() * 100 + 'vh';
    img.style.left = Math.random() * 100 + 'vw';
  }

  function moveImg(img) {
    img.style.top = Math.random() * 80 + 'vh';
    img.style.left = Math.random() * 80 + 'vw';
    img.style.transform = `scale(${Math.random() + 0.5}) rotate(${Math.random() * 360}deg)`;
    
    setTimeout(() => moveImg(img), 10000); // New move every 10 seconds
  }

  // Initialize images
  for(let i=0; i < imgCount; i++) {
    createImg();
  }
</script>

</body>
</html>
